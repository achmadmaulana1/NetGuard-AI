name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: Achmad_Maulana_241730016_UAS_AI/12_Deployment/netguard-next-platform
      - run: npm run build
        working-directory: Achmad_Maulana_241730016_UAS_AI/12_Deployment/netguard-next-platform
